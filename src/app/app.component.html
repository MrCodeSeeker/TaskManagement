<app-header></app-header>
<main>
  <ul id= "users">
    @for(user of users;track user.id)
    {
      <li >
        <app-user [user]="user" [selected]="user.id==selectedUser?.id" (select)="onSelectdUser($event)"></app-user>
      </li>
    }
  </ul>
@if(this.selectedUser){
  <app-tasks [selectedUser]="this.selectedUser"></app-tasks>
}
 
</main>
